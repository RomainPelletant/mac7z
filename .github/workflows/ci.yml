name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest  # Apple Silicon (M1/M2/M3)
          - arch: x86_64
            runner: macos-15-intel      # Intel

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Download 7zz binary
        run: bash scripts/setup.sh

      - name: Build macOS (${{ matrix.arch }})
        run: flutter build macos --release
