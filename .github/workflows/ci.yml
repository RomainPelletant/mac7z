name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Dart format check
        run: dart format --output=none lib/

      - name: Flutter analyze (failed only on error found)
        run: |
          flutter analyze 2>&1 | tee /tmp/analysis.txt || true
          grep -q "^ *error •" /tmp/analysis.txt && exit 1 || exit 0

  build-macos:
    needs: lint
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          - arch: x86_64
            runner: macos-15-intel

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Download 7zz binary
        run: bash scripts/setup.sh

      - name: Build macOS (${{ matrix.arch }})
        run: flutter build macos --release

  build-linux:
    needs: lint
    name: Build Linux (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev libblkid-dev liblzma-dev \
            libsecret-1-dev libjsoncpp-dev git xz-utils

      - name: Setup Flutter (x86_64)
        if: matrix.arch == 'x86_64'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Flutter (arm64 — manual install)
        if: matrix.arch == 'arm64'
        run: |
          git clone https://github.com/flutter/flutter.git \
            --branch stable --depth 1 "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"

      - name: Flutter precache & config
        run: |
          flutter precache --linux
          flutter config --enable-linux-desktop

      - name: Flutter pub get
        run: flutter pub get

      - name: Download 7zz binary
        run: bash scripts/setup.sh

      - name: Build Linux (${{ matrix.arch }})
        run: flutter build linux --release
