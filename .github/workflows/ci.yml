name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 4 * * 1'   # Weekly CodeQL scan every Monday at 4am UTC

permissions:
  contents: read

jobs:

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Dart format check
        run: dart format --output=none lib/

      - name: Flutter analyze (failed only on error found)
        run: |
          flutter analyze 2>&1 | tee /tmp/analysis.txt || true
          grep -q "^ *error •" /tmp/analysis.txt && exit 1 || exit 0

  codeql:
    name: CodeQL (Dart)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: dart
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:dart

  build-macos:
    needs: lint
    if: github.event_name != 'schedule'
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest  # Apple Silicon (M1/M2/M3)
          - arch: x86_64
            runner: macos-15-intel      # Intel

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Download 7zz binary
        run: bash scripts/setup.sh

      - name: Build macOS (${{ matrix.arch }})
        run: flutter build macos --release

  build-linux:
    needs: lint
    if: github.event_name != 'schedule'
    name: Build Linux (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev libblkid-dev liblzma-dev \
            libsecret-1-dev libjsoncpp-dev git xz-utils

      # subosito/flutter-action ne supporte pas les runners ARM64 Linux
      # → on installe Flutter manuellement via git clone pour arm64
      - name: Setup Flutter (x86_64)
        if: matrix.arch == 'x86_64'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Flutter (arm64 — manual install)
        if: matrix.arch == 'arm64'
        run: |
          git clone https://github.com/flutter/flutter.git \
            --branch stable --depth 1 "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"

      - name: Flutter precache & config
        run: |
          flutter precache --linux
          flutter config --enable-linux-desktop

      - name: Flutter pub get
        run: flutter pub get

      - name: Download 7zz binary
        run: bash scripts/setup.sh

      - name: Build Linux (${{ matrix.arch }})
        run: flutter build linux --release
